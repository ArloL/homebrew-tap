name: brew test-bot
on:
  push:
    branches:
    - main
  pull_request:
permissions: {}
jobs:
  test-bot:
    strategy:
      matrix:
        os:
        - macos-26
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
    - name: Set up Homebrew
      id: set-up-homebrew
      uses: Homebrew/actions/setup-homebrew@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Cache Homebrew Bundler RubyGems
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
        path: ${{ steps.set-up-homebrew.outputs.gems-path }}
        restore-keys: ${{ matrix.os }}-rubygems-
    - run: brew trust arlol/tap
    - run: brew test-bot --only-cleanup-before
    - run: brew test-bot --only-setup
    - run: brew test-bot --only-tap-syntax
    - if: github.event_name == 'pull_request'
      run: brew test-bot --only-formulae
    - if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: bottles_${{ matrix.os }}
        path: "*.bottle.*"
  required-status-check:
    name: tests.required-status-check
    needs:
    - test-bot
    # GitHub Actions skips this job when any of the dependents fail. And skips
    # are considered success in their weird logic. So we always run it and fail
    # ourselves if necessary
    if: always()
    runs-on: ubuntu-latest
    steps:
    - run: echo "Use this job as the required status check of this workflow"
    - name: Check that all jobs were successful
      env:
        RESULTS: ${{ toJSON(needs) }}
      run: |
        echo "$RESULTS" | jq --exit-status 'all(.result == "success")' || exit 1
